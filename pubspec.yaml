name: kids_english_reader
description: A simple English picture book reading app for kids

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 相机
  camera: ^0.10.5+9
  
  # 图片选择
  image_picker: ^1.0.7
  
  # HTTP请求
  http: ^1.2.0
  
  # 加密（用于API签名）
  crypto: ^3.0.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 权限管理
  permission_handler: ^11.3.0
  
  # 动画
  lottie: ^3.0.0
  
  # 音频播放
  audioplayers: ^5.2.1
  
  # 录音（用于语音识别）
  record: ^5.0.4
  
  # 路径
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # 环境变量
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - .env
