name: kids_english_reader
description: A simple English picture book reading app for kids

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 相机
  camera: ^0.10.5+9
  
  # 图片选择
  image_picker: ^1.0.7
  
  # HTTP请求
  http: ^1.2.0
  
  # 加密（用于API签名）
  crypto: ^3.0.3
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 权限管理 - 降级以兼容Flutter 3.13
  permission_handler: ^10.4.5
  
  # 动画
  lottie: ^2.7.0
  
  # 路径
  path_provider: ^2.1.2
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
