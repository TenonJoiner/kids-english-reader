# Codemagic 构建配置
# 访问 https://codemagic.io 导入此项目

workflows:
  android-release:
    name: Android Release Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # 环境变量将在Codemagic控制台配置
      # ALIBABA_ACCESS_KEY_ID
      # ALIBABA_ACCESS_KEY_SECRET
      # ALIBABA_APP_KEY
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Create .env file
        script: |
          echo "ALIBABA_ACCESS_KEY_ID=$ALIBABA_ACCESS_KEY_ID" > .env
          echo "ALIBABA_ACCESS_KEY_SECRET=$ALIBABA_ACCESS_KEY_SECRET" >> .env
          echo "ALIBABA_APP_KEY=$ALIBABA_APP_KEY" >> .env
          echo ".env文件已创建"
      
      - name: Get Flutter packages
        script: flutter packages pub get
      
      - name: Build APK
        script: flutter build apk --release
      
      - name: Build AppBundle
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com
