name: Android Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
    
    - name: Recreate Android project
      run: |
        # 备份到/tmp
        cp -r lib /tmp/lib_backup
        cp -r assets /tmp/assets_backup 2>/dev/null || true
        cp pubspec.yaml /tmp/pubspec_backup.yaml
        
        # 删除所有文件（除了.git）
        find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
        
        # 创建新项目
        flutter create --no-pub --org com.example --project-name kids_english_reader .
        
        # 恢复代码
        rm -rf lib
        cp -r /tmp/lib_backup lib
        cp -r /tmp/assets_backup assets 2>/dev/null || true
        cp /tmp/pubspec_backup.yaml pubspec.yaml
        
        # 添加Android配置
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "build/app/outputs/flutter-apk/app-release.apk"
        tag: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          儿童英语绘本阅读App
          
          ## 安装说明
          1. 下载 `app-release.apk`
          2. 在Android手机上安装
          3. 首次打开时配置阿里云API密钥
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
