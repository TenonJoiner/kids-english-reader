name: Android Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: '创建Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get version from pubspec.yaml
      id: get_version
      run: |
        VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //g' | sed 's/+.*//g' | tr -d ' ')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "App Version: $VERSION"
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Disable Flutter analytics
      run: flutter config --no-analytics
    
    - name: Recreate Android project
      run: |
        # 备份到/tmp
        cp -r lib /tmp/lib_backup
        cp -r assets /tmp/assets_backup 2>/dev/null || true
        cp pubspec.yaml /tmp/pubspec_backup.yaml
        
        # 删除所有文件（除了.git）
        find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
        
        # 创建新项目
        flutter create --no-pub --org com.example --project-name kids_english_reader .
        
        # 恢复代码
        rm -rf lib
        cp -r /tmp/lib_backup lib
        cp -r /tmp/assets_backup assets 2>/dev/null || true
        cp /tmp/pubspec_backup.yaml pubspec.yaml
        
        # 修改Android配置 - 提高minSdkVersion到21
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        
        # 添加Gradle配置
        echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: github.event.inputs.create_release == 'true'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "build/app/outputs/flutter-apk/app-release.apk"
        tag: v${{ env.VERSION }}
        name: Release v${{ env.VERSION }}
        body: |
          儿童英语绘本阅读App v${{ env.VERSION }}
          
          ## 安装说明
          1. 下载 `app-release.apk`
          2. 在Android手机上安装
          3. 首次打开时配置百炼API Key
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: true
